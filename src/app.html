<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="JR運賃計算アプリ" />
		<meta name="theme-color" content="#9333ea" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Farert" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<script>
			(() => {
				if (typeof navigator !== 'undefined' && navigator.onLine === false) {
					return;
				}

				const fontLink = document.createElement('link');
				fontLink.rel = 'stylesheet';
				fontLink.href =
					'https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0';
				document.head.appendChild(fontLink);

				const isLocalPreview = ['localhost', '127.0.0.1'].includes(window.location.hostname);
				if (isLocalPreview) {
					return;
				}

				const gaScript = document.createElement('script');
				gaScript.async = true;
				gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-C8XXJQ6Y10';
				gaScript.onload = () => {
					window.dataLayer = window.dataLayer || [];
					function gtag(){window.dataLayer.push(arguments);}
					gtag('js', new Date());
					gtag('config', 'G-C8XXJQ6Y10');
				};
				document.head.appendChild(gaScript);
			})();
		</script>
		%sveltekit.head%
		<!-- WASM モジュールローダー -->
		<script type="module">
			import createFaretModule from '%sveltekit.assets%/farert.js';
			window.__createFaretModule = createFaretModule;
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
